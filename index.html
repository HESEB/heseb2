;height:100vh;min-height:100vh;border-radius:0}}

<body>
<main class="phone"><header class="app-header"><button class="header-nav" data-screen="sns">SNS</button><h1>HESEB</h1><button class="header-nav" data-screen="groupChat">단체채팅</button></header><section id="screen-stack" class="screen-stack"><section id="sns-screen" class="screen"><div class="sns-head"><h2 class="screen-title">SNS</h2><button id="open-post-form" class="write-button">글쓰기</button></div><div id="post-list"><article class="card sns-card" data-post-id="buddy"><div class="profile-row"><div class="avatar">B</div><div><strong>버디</strong><span class="post-time">방금 전</span></div></div><p class="post-text">오늘은 별일 없어도 괜찮은 날 같아.</p><div class="reaction-row"><button class="like-button" data-like-count="8" aria-pressed="false">♡ <span>8</span></button><button class="comment-button">댓글 <span class="comment-count"></span></button></div></article><article class="card sns-card" data-post-id="hash" hidden><div class="profile-row"><div class="avatar hash">H</div><div><strong>해시</strong><span class="post-time">12분 전</span></div></div><p class="post-text">커피는 식었지만 아직 할 일은 남았슴다.</p><div class="reaction-row"><button class="like-button" data-like-count="11" aria-pressed="false">♡ <span>11</span></button><button class="comment-button">댓글 <span class="comment-count"></span></button></div></article><article class="card sns-card" data-post-id="ena" hidden><div class="profile-row"><div class="avatar ena">E</div><div><strong>에나</strong><span class="post-time">25분 전</span></div></div><p class="post-text">오늘 하늘이 예뻐서 마음에 저장했어용.</p><div class="reaction-row"><button class="like-button" data-like-count="15" aria-pressed="false">♡ <span>15</span></button><button class="comment-button">댓글 <span class="comment-count"></span></button></div></article></div><p id="post-counter" class="counter">1 / 3</p></section><section id="group-chat-screen" class="screen chat-screen" hidden><h2 class="screen-title">5인 단체채팅</h2><div id="chat-scroll" class="chat-scroll"></div><form id="chat-form" class="chat-input"><input id="chat-message" maxlength="200" autocomplete="off" placeholder="메시지 입력"><button id="send-chat-message" type="submit" disabled>전송</button></form></section></section><section id="comments" class="overlay" hidden><div class="panel"><div class="panel-head"><strong id="comments-title">댓글</strong><button id="close-comments">×</button></div><div id="comments-list" class="comments-list"></div></div></section><section id="post-form" class="overlay" hidden><form class="panel post-form"><div class="panel-head"><strong>새 게시물</strong><button id="close-post-form">×</button></div><textarea id="post-text" maxlength="200" placeholder="지금 어떤 생각을 하고 있나요?"></textarea><p id="form-status" class="form-status">0 / 200</p><div class="form-actions"><button id="cancel-post" class="cancel-post" type="button">취소</button><button id="submit-post" class="submit-post" type="submit" disabled>게시</button></div></form></section></main>
<script>
"use strict";
const STORAGE_KEY="HESEB_PLAYER_TEXT_POSTS_V1",LIKE_STORAGE_KEY="HESEB_SNS_LIKE_STATES_V1",CHAT_STORAGE_KEY="HESEB_GROUP_CHAT_MESSAGES_V2";
const baseChat=[{role:"character",character:"buddy",name:"버디",avatar:"B",className:"",text:"다들 오늘 뭐 하고 있었어?"},{role:"character",character:"hash",name:"해시",avatar:"H",className:"hash",text:"전 그냥 여기 있었슴다."},{role:"character",character:"ena",name:"에나",avatar:"E",className:"ena",text:"에나도 방금 들어왔어용."},{role:"character",character:"sady",name:"새디",avatar:"S",className:"sady",text:"오늘은 조용하네요."},{role:"character",character:"ion",name:"이온",avatar:"I",className:"ion",text:"현재 5명이 참여 중입니다."}];
const characters=[{id:"buddy",name:"버디",avatar:"B",className:""},{id:"hash",name:"해시",avatar:"H",className:"hash"},{id:"ena",name:"에나",avatar:"E",className:"ena"},{id:"sady",name:"새디",avatar:"S",className:"sady"},{id:"ion",name:"이온",avatar:"I",className:"ion"}];
const replySets={greeting:{buddy:["오, 안녕! 왔네?","반가워. 오늘도 왔구나!"],hash:["어서오십쇼.","안녕하심까."],ena:["안녕이에용!","왔어용? 반가워용!"],sady:["안녕하세요.","오셨네요."],ion:["접속 인사가 확인되었습니다.","인사 메시지를 기록했습니다."]},question:{buddy:["음, 나도 그건 궁금한데?","어떤 부분이 제일 궁금해?"],hash:["질문 확인했슴다.","조금 더 구체적으로 말씀해보십쇼."],ena:["에나도 같이 생각해볼게용!","어떤 답을 기대하는지 궁금해용."],sady:["질문의 요점을 확인해 보겠습니다.","그 부분은 생각해 볼 만하네요."],ion:["질문 형식으로 분류되었습니다.","확인을 위한 질문이 기록되었습니다."]},thanks:{buddy:["뭘, 이 정도 가지고ㅋㅋ","천만에. 같이 있잖아."],hash:["별말씀을요.","도움이 됐다면 다행임다."],ena:["에나도 고마워용!","헤헤, 천만에용!"],sady:["도움이 되었다니 다행입니다.","괜찮습니다."],ion:["감사 표현이 확인되었습니다.","긍정 반응을 기록했습니다."]},exclamation:{buddy:["오, 반응 좋은데?","ㅋㅋ 그 정도로 놀랐어?"],hash:["반응이 크심다.","놀라신 것 같슴다."],ena:["우와, 에나도 신나용!","진짜용? 대박이에용!"],sady:["상당히 인상적이었나 보네요.","반응이 확실하네요."],ion:["강한 반응이 감지되었습니다.","감탄 표현을 기록했습니다."]},daily:{buddy:["그랬구나. 오늘은 어땠어?","응, 듣고 있어. 더 말해봐."],hash:["그렇군요. 계속 말씀해보십쇼.","일상 내용 확인했슴다."],ena:["그랬구나용. 같이 얘기해봐용!","에나가 듣고 있어용!"],sady:["그런 일이 있었군요.","계속 말씀해 주세요."],ion:["일상 대화로 분류되었습니다.","현재 대화가 이어지고 있습니다."]}};
const followupSets={greeting:["나도 인사할래.","다들 반기는 분위기네."],question:["나도 그 답이 궁금해.","앞의 질문에 덧붙이면 나도 궁금해."],thanks:["나도 고맙다고 할래.","좋게 마무리됐네."],exclamation:["반응이 꽤 큰데?","나도 조금 놀랐어."],daily:["맞아, 나도 비슷하게 생각했어.","응, 그 이야기 조금 더 듣고 싶어."]};
const commentData={buddy:[{name:"해시",text:"그런 날도 괜찮슴다."},{name:"에나",text:"잠깐 들렀다 가도 좋아용."},{name:"새디",text:"확인했습니다."}],hash:[{name:"버디",text:"커피 한 잔 더 마실래?"},{name:"에나",text:"식은 커피도 나름 괜찮아용."},{name:"새디",text:"할 일부터 정리하시죠."},{name:"이온",text:"댓글 4개가 기록되었습니다."}],ena:[{name:"해시",text:"사진도 올려주면 좋겠슴다."},{name:"버디",text:"나도 하늘 봤어. 예쁘더라."},{name:"새디",text:"맑은 날씨로 확인됩니다."},{name:"이온",text:"게시물 반응이 기록되었습니다."},{name:"나래",text:"오늘 하늘 정말 좋았어요."},{name:"루미",text:"다음에는 사진도 보여줘!"}]};
const screens={sns:document.getElementById("sns-screen"),groupChat:document.getElementById("group-chat-screen")},stack=document.getElementById("screen-stack"),chat=document.getElementById("chat-scroll"),chatForm=document.getElementById("chat-form"),chatMessage=document.getElementById("chat-message"),sendChatMessage=document.getElementById("send-chat-message"),postList=document.getElementById("post-list"),counter=document.getElementById("post-counter"),comments=document.getElementById("comments"),commentsList=document.getElementById("comments-list"),commentsTitle=document.getElementById("comments-title"),postForm=document.getElementById("post-form"),postText=document.getElementById("post-text"),formStatus=document.getElementById("form-status"),submitPost=document.getElementById("submit-post");
let cards=[...document.querySelectorAll(".sns-card")],screen="sns",post=0,playerPostNumber=0,replySequence=0,replyToken=0,g={on:false,id:null,x:0,y:0,lastY:0,axis:null};
const readJSON=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch{return f}},writeJSON=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}},wait=ms=>new Promise(r=>setTimeout(r,ms));
function classifyMessage(text){const t=text.trim().toLowerCase();if(/[?？]$/.test(t)||/(뭐|왜|어떻게|언제|어디|누구|맞아|할까|인가|나요|니\?|까\?)/.test(t))return"question";if(/(고마워|고맙|감사|땡큐|thanks)/.test(t))return"thanks";if(/(안녕|하이|hello|반가워|좋은 아침|좋은 저녁)/.test(t))return"greeting";if(/[!！]{1,}$/.test(t)||/(대박|헐|우와|와우|미쳤|최고|ㅋㅋㅋ|ㅎㅎㅎ)/.test(t))return"exclamation";return"daily"}
function scrollChatToLatest(){requestAnimationFrame(()=>{chat.scrollTop=chat.scrollHeight;requestAnimationFrame(()=>chat.scrollTop=chat.scrollHeight)})}function showScreen(n){screen=n;Object.entries(screens).forEach(([k,v])=>v.hidden=k!==n);if(n==="groupChat")scrollChatToLatest()}function refreshCards(){cards=[...document.querySelectorAll(".sns-card")]}function showPost(i){refreshCards();post=(i+cards.length)%cards.length;cards.forEach((c,n)=>c.hidden=n!==post);counter.textContent=`${post+1} / ${cards.length}`}function reset(){g={on:false,id:null,x:0,y:0,lastY:0,axis:null}}
function renderCommentCounts(){refreshCards();cards.forEach(c=>c.querySelector(".comment-count").textContent=String((commentData[c.dataset.postId]||[]).length))}function openComments(id){const list=commentData[id]||[];commentsTitle.textContent=`댓글 ${list.length}`;commentsList.replaceChildren();if(!list.length){const e=document.createElement("div");e.className="comments-empty";e.textContent="아직 댓글이 없습니다.";commentsList.append(e)}else list.forEach(x=>{const r=document.createElement("div");r.className="comment";r.innerHTML="<strong></strong><p></p>";r.querySelector("strong").textContent=x.name;r.querySelector("p").textContent=x.text;commentsList.append(r)});comments.hidden=false}
function readSavedPosts(){const v=readJSON(STORAGE_KEY,[]);return Array.isArray(v)?v:[]}function readLikeStates(){const v=readJSON(LIKE_STORAGE_KEY,{});return v&&typeof v==="object"?v:{}}function saveLikeState(id,liked,count){const s=readLikeStates();s[id]={liked,likeCount:count};writeJSON(LIKE_STORAGE_KEY,s)}function toggleLike(b){const liked=b.getAttribute("aria-pressed")==="true",base=Number(b.dataset.likeCount),next=!liked,count=base+(next?1:0);b.setAttribute("aria-pressed",String(next));b.firstChild.textContent=next?"♥ ":"♡ ";b.querySelector("span").textContent=String(count);saveLikeState(b.closest(".sns-card").dataset.postId,next,count)}
function formatRelativeTime(t){const d=Math.max(0,Date.now()-Number(t)),m=6e4,h=36e5,day=864e5;if(d<m)return"방금 전";if(d<h)return`${Math.floor(d/m)}분 전`;if(d<day)return`${Math.floor(d/h)}시간 전`;if(d<day*7)return`${Math.floor(d/day)}일 전`;return new Date(t).toLocaleDateString("ko-KR")}function buildPlayerPost(r){const a=document.createElement("article");a.className="card sns-card";a.dataset.postId=r.id;a.dataset.playerPost="true";a.innerHTML='<div class="profile-row"><div class="avatar player">나</div><div><strong>사용자</strong><span class="post-time"></span></div></div><p class="post-text"></p><div class="reaction-row"><button class="like-button" data-like-count="0" aria-pressed="false">♡ <span>0</span></button><button class="comment-button">댓글 <span class="comment-count">0</span></button></div>';a.querySelector(".post-text").textContent=r.text;a.querySelector(".post-time").textContent=formatRelativeTime(r.createdAt);a.querySelector(".like-button").onclick=e=>toggleLike(e.currentTarget);a.querySelector(".comment-button").onclick=()=>openComments(r.id);postList.prepend(a)}function restorePlayerPosts(){readSavedPosts().forEach(buildPlayerPost);showPost(0)}function createPlayerPost(text){const l=readSavedPosts(),r={id:`player-${Date.now()}-${++playerPostNumber}`,text,createdAt:Date.now()};l.push(r);writeJSON(STORAGE_KEY,l);buildPlayerPost(r);showPost(0)}
function renderChatMessage(r){const row=document.createElement("div");row.className=`chat-row${r.role==="player"?" player-message":""}`;const av=document.createElement("div"),ct=document.createElement("div"),nm=document.createElement("strong"),msg=document.createElement("p");av.className=`avatar ${r.role==="player"?"player":r.className||""}`;av.textContent=r.role==="player"?"나":r.avatar;ct.className="content";nm.textContent=r.role==="player"?"사용자":r.name;msg.textContent=r.text;ct.append(nm,msg);row.append(av,ct);chat.append(row);scrollChatToLatest()}function readChat(){const v=readJSON(CHAT_STORAGE_KEY,[]);return Array.isArray(v)?v:[]}function writeChat(v){writeJSON(CHAT_STORAGE_KEY,v)}function restoreChat(){baseChat.forEach(renderChatMessage);const saved=readChat();saved.forEach(renderChatMessage);replySequence=saved.filter(x=>x.role==="character").length;scrollChatToLatest()}
function chooseReply(type,excluded=null,followup=false){let c=characters[replySequence%characters.length];while(c.id===excluded){replySequence++;c=characters[replySequence%characters.length]}let text;if(followup){const pool=followupSets[type]||followupSets.daily;text=pool[Math.floor(replySequence/characters.length)%pool.length]}else{const pool=(replySets[type]&&replySets[type][c.id])||replySets.daily[c.id];text=pool[Math.floor(replySequence/characters.length)%pool.length]}replySequence++;return{role:"character",character:c.id,name:c.name,avatar:c.avatar,className:c.className,text,type,createdAt:Date.now()}}function appendReply(r){const l=readChat();l.push(r);writeChat(l);renderChatMessage(r)}async function scheduleReplies(token,type){await wait(800);if(token!==replyToken)return;const first=chooseReply(type);appendReply(first);await wait(900);if(token!==replyToken)return;const second=chooseReply(type,first.character,true);appendReply(second)}function addPlayerMessage(text){replyToken++;const token=replyToken,type=classifyMessage(text),l=readChat(),r={role:"player",text,type,createdAt:Date.now()};l.push(r);writeChat(l);renderChatMessage(r);scheduleReplies(token,type)}
stack.addEventListener("pointerdown",e=>{if(!comments.hidden||!postForm.hidden||e.target.closest("button,input,textarea"))return;g={on:true,id:e.pointerId,x:e.clientX,y:e.clientY,lastY:e.clientY,axis:null};stack.setPointerCapture(e.pointerId)},true);stack.addEventListener("pointermove",e=>{if(!g.on||g.id!==e.pointerId)return;const dx=e.clientX-g.x,dy=e.clientY-g.y;if(!g.axis&&Math.max(Math.abs(dx),Math.abs(dy))>12)g.axis=Math.abs(dx)>Math.abs(dy)?"h":"v";if(screen==="groupChat"&&g.axis==="v")chat.scrollTop-=e.clientY-g.lastY;g.lastY=e.clientY},true);stack.addEventListener("pointerup",e=>{if(!g.on||g.id!==e.pointerId)return;const dx=e.clientX-g.x,dy=e.clientY-g.y;if(g.axis==="h"&&Math.abs(dx)>55)showScreen(screen==="sns"?"groupChat":"sns");else if(g.axis==="v"&&screen==="sns"&&Math.abs(dy)>55)showPost(post+(dy<0?1:-1));reset()},true);
document.querySelectorAll("[data-screen]").forEach(b=>b.onclick=()=>showScreen(b.dataset.screen));document.querySelectorAll(".like-button").forEach(b=>b.onclick=()=>toggleLike(b));document.querySelectorAll(".comment-button").forEach(b=>b.onclick=()=>openComments(b.closest(".sns-card").dataset.postId));document.getElementById("close-comments").onclick=()=>comments.hidden=true;comments.onclick=e=>{if(e.target===comments)comments.hidden=true};document.getElementById("open-post-form").onclick=()=>{postForm.hidden=false;postText.focus()};function closePostForm(){postForm.hidden=true;postText.value="";formStatus.textContent="0 / 200";submitPost.disabled=true}document.getElementById("close-post-form").onclick=closePostForm;document.getElementById("cancel-post").onclick=closePostForm;postForm.onclick=e=>{if(e.target===postForm)closePostForm()};postText.oninput=()=>{formStatus.textContent=`${postText.value.length} / 200`;submitPost.disabled=!postText.value.trim()};postForm.querySelector("form").onsubmit=e=>{e.preventDefault();const t=postText.value.trim();if(t){createPlayerPost(t);closePostForm()}};chatMessage.oninput=()=>sendChatMessage.disabled=!chatMessage.value.trim();chatForm.onsubmit=e=>{e.preventDefault();const t=chatMessage.value.trim();if(!t)return;addPlayerMessage(t);chatMessage.value="";sendChatMessage.disabled=true;chatMessage.focus()};
