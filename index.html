};
const BASE_CHAT=[{role:"character",...CHARACTER_DB.buddy,text:"다들 오늘 뭐 하고 있었어?"},{role:"character",...CHARACTER_DB.hash,text:"전 그냥 여기 있었슴다."},{role:"character",...CHARACTER_DB.ena,text:"에나도 방금 들어왔어용."},{role:"character",...CHARACTER_DB.sady,text:"오늘은 조용하네요."},{role:"character",...CHARACTER_DB.ion,text:"현재 5명이 참여 중입니다."}];

 {id:"thanks",patterns:[/고마워/,/고맙/,/감사/,/땡큐/,/thanks/i]},{id:"apology",patterns:[/미안/,/죄송/,/사과/]},{id:"farewell",patterns:[/잘 ?자/,/바이/,/안녕히/,/나 갈게/,/나가볼게/,/또 봐/]},{id:"greeting",patterns:[/안녕/,/안뇽/,/하이/,/hello/i,/반가워/,/좋은 아침/,/좋은 저녁/]},{id:"distress",patterns:[/힘들/,/지쳤/,/피곤/,/속상/,/슬퍼/,/우울/,/괴로/,/짜증/,/화나/,/눈물/]},{id:"praise",patterns:[/멋지/,/잘했/,/최고/,/대단/,/예쁘/,/귀엽/,/좋네/]},{id:"activityQuestion",patterns:[/뭐\s*해/,/뭐\s*함/,/뭐\s*하노/,/뭐\s*하냐/,/뭐\s*하나/,/뭐\s*하는데/,/뭐\s*하는\s*중/,/뭐\s*하고/,/오늘\s*뭐/,/지금\s*뭐/,/어디야/,/어디\s*있어/]},{id:"reasonQuestion",patterns:[/왜/,/무슨\s*이유/,/어째서/]},{id:"wellbeing",patterns:[/잘\s*지내/,/어떻게\s*지내/,/괜찮아/,/기분\s*어때/,/오늘\s*어때/]},{id:"experience",patterns:[/일이\s*있었/,/일\s*있었/,/다녀왔/,/먹었어/,/봤어/,/갔어/,/왔어/]},{id:"exclamation",patterns:[/[!！]+$/, /대박/,/헐/,/우와/,/와우/,/미쳤/,/ㅋㅋㅋ/,/ㅎㅎㅎ/]},{id:"question",patterns:[/[?？]$/, /어떻게/,/언제/,/어디/,/누구/,/할까/,/인가/,/나요$/, /니$/]},{id:"daily",patterns:[/.*/]}
];
const BASE_RESPONSES={
 greeting:["안녕! 반가워.","오늘도 왔구나. 반가워."],thanks:["천만에. 같이 있잖아.","도움이 됐다면 나도 좋아."],apology:["괜찮아. 너무 신경 쓰지 마.","미안해하지 않아도 돼."],farewell:["잘 자. 푹 쉬어.","다음에 또 보자."],distress:["천천히 말해도 돼.","무슨 일인지 들어줄게."],praise:["그렇게 말해주니 기분 좋다.","좋게 봐줘서 고마워."],activityQuestion:["난 잠깐 쉬고 있었어.","나는 하던 일을 정리하고 있었어."],reasonQuestion:["어떤 상황을 말하는 거야?","앞에 어떤 일이 있었는지 조금만 더 알려줘."],wellbeing:["난 괜찮아. 너는 오늘 어때?","오늘 기분은 어때?"],experience:["무슨 일이 있었어?","그다음은 어떻게 됐어?"],exclamation:["우와, 나도 놀랐어!","반응이 꽤 큰데?"],question:["어떤 부분이 궁금한지 조금 더 알려줘.","나도 같이 생각해볼게."],daily:["응, 듣고 있어.","그 이야기 더 듣고 싶어."]
};
const SYSTEM_RESPONSES={greeting:["인사 메시지를 확인했습니다."],thanks:["감사 표현을 확인했습니다."],apology:["사과 표현을 확인했습니다."],farewell:["대화 종료 의사를 확인했습니다."],distress:["부정 감정 신호를 확인했습니다."],praise:["긍정 평가를 확인했습니다."],activityQuestion:["현재 대화방을 확인 중이었습니다."],reasonQuestion:["추가 맥락이 필요합니다."],wellbeing:["현재 상태는 정상입니다."],experience:["경험 공유가 시작되었습니다."],exclamation:["강한 반응을 감지했습니다."],question:["정확한 응답을 위해 세부 정보가 필요합니다."],daily:["현재 대화가 이어지고 있습니다."]};
const COMMENTS={buddy:[{name:"해시",text:"그런 날도 괜찮슴다."},{name:"에나",text:"잠깐 들렀다 가도 좋아용."},{name:"새디",text:"확인했습니다."}],hash:[{name:"버디",text:"커피 한 잔 더 마실래?"},{name:"에나",text:"식은 커피도 나름 괜찮아용."}],ena:[{name:"해시",text:"사진도 올려주면 좋겠슴다."},{name:"버디",text:"나도 하늘 봤어. 예쁘더라."}]};
const $=id=>document.getElementById(id),screens={sns:$("sns-screen"),groupChat:$("group-chat-screen")},stack=$("screen-stack"),chat=$("chat-scroll"),statusStrip=$("status-strip"),chatForm=$("chat-form"),chatInput=$("chat-message"),sendButton=$("send-chat-message"),postList=$("post-list"),counter=$("post-counter"),comments=$("comments"),commentsList=$("comments-list"),commentsTitle=$("comments-title"),postForm=$("post-form"),postText=$("post-text"),formStatus=$("form-status"),submitPost=$("submit-post");
let cards=[...document.querySelectorAll(".sns-card")],screen="sns",post=0,replySequence=0,replyToken=0,gesture={on:false,id:null,x:0,y:0,lastY:0,axis:null};
const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}},write=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}},wait=ms=>new Promise(r=>setTimeout(r,ms));
function activeCharacters(){return ENGINE.activeParty.map(id=>CHARACTER_DB[id]).filter(Boolean)}
function getStatus(c,date=new Date()){const hour=date.getHours(),rule=(c.statusRules.hours||[]).find(r=>hour>=r.from&&hour<r.to);return rule?.status||c.statusRules.default||"available"}
function statusInfo(c){const id=getStatus(c);return{id,...STATUS_DB[id]}}
function renderStatuses(){statusStrip.replaceChildren();for(const c of activeCharacters()){const s=statusInfo(c),chip=document.createElement("span");chip.className=`status-chip${s.canReply?"":" busy"}`;chip.textContent=`${c.name} · ${s.label}`;statusStrip.append(chip)}}
function detectTarget(text){const normalized=text.replace(/\s/g,"");return activeCharacters().find(c=>c.aliases.some(a=>normalized.includes(a.replace(/\s/g,""))))?.id||null}
function stripTarget(text,targetId){if(!targetId)return text;let result=text;for(const alias of CHARACTER_DB[targetId].aliases)result=result.replaceAll(alias,"");return result.trim()}
function classify(text){const value=text.trim().toLowerCase();for(const intent of INTENTS)if(intent.patterns.some(p=>p.test(value)))return intent.id;return"daily"}
function analyze(text){const targetId=detectTarget(text),body=stripTarget(text,targetId),intent=body?classify(body):"greeting";return{targetId,intent}}
function pick(arr,index=0){return arr[Math.abs(index)%arr.length]}
function characterFilter(base,c,sequence,status){if(c.species==="ai")return pick(SYSTEM_RESPONSES[sequence.intent]||SYSTEM_RESPONSES.daily,sequence.number);let text=base;if(status.short)text=text.split(/[.!?]/)[0]+".";
 if(c.speech.level==="military")text=text.replace(/말해도 돼/g,"말씀하셔도 됨다").replace(/말해줘/g,"말씀해주십쇼").replace(/알려줘/g,"알려주십쇼").replace(/있었어/g,"있었슴다").replace(/궁금해/g,"궁금함다").replace(/괜찮아/g,"괜찮슴다").replace(/쉬어/g,"쉬십쇼").replace(/보자/g,"보십쇼").replace(/할게/g,"하겠슴다");
 else if(c.speech.level==="yong"){text=text.replace(/말해도 돼/g,"말해도 돼용").replace(/말해줘/g,"말해줘용").replace(/알려줘/g,"알려줘용").replace(/있었어/g,"있었어용").replace(/궁금해/g,"궁금해용").replace(/괜찮아/g,"괜찮아용").replace(/쉬어/g,"쉬어용").replace(/보자/g,"봐용").replace(/할게/g,"할게용").replace(/반가워/g,"반가워용");if(c.speech.habits.includes("selfName")&&sequence.number%4===0)text="에나도 "+text}
 else if(c.speech.level==="polite")text=text.replace(/말해도 돼/g,"말씀하셔도 괜찮습니다").replace(/말해줘/g,"말씀해 주세요").replace(/알려줘/g,"알려주세요").replace(/있었어/g,"있었습니다").replace(/궁금해/g,"궁금합니다").replace(/괜찮아/g,"괜찮습니다").replace(/쉬어/g,"쉬세요").replace(/보자/g,"뵙죠").replace(/할게/g,"하겠습니다").replace(/반가워/g,"반갑습니다");
 else if(c.speech.habits.includes("laugh")&&sequence.number%3===1)text+=" ㅋㅋ";
 return text}
function buildReply(intent,c){const status=statusInfo(c),base=pick(BASE_RESPONSES[intent]||BASE_RESPONSES.daily,replySequence);return characterFilter(base,c,{intent,number:replySequence},status)}
function scrollLatest(){requestAnimationFrame(()=>{chat.scrollTop=chat.scrollHeight;requestAnimationFrame(()=>chat.scrollTop=chat.scrollHeight)})}
function showScreen(name){screen=name;Object.entries(screens).forEach(([k,v])=>v.hidden=k!==name);if(name==="groupChat"){renderStatuses();scrollLatest()}}
function refreshCards(){cards=[...document.querySelectorAll(".sns-card")]}
function showPost(i){refreshCards();post=(i+cards.length)%cards.length;cards.forEach((c,n)=>c.hidden=n!==post);counter.textContent=`${post+1} / ${cards.length}`}
function renderComments(){refreshCards();cards.forEach(c=>{const el=c.querySelector(".comment-count");if(el)el.textContent=String((COMMENTS[c.dataset.postId]||[]).length)})}
function openComments(id){const list=COMMENTS[id]||[];commentsTitle.textContent=`댓글 ${list.length}`;commentsList.replaceChildren();if(!list.length){const e=document.createElement("div");e.className="comments-empty";e.textContent="아직 댓글이 없습니다.";commentsList.append(e)}else for(const item of list){const row=document.createElement("div");row.className="comment";row.innerHTML="<strong></strong><p></p>";row.querySelector("strong").textContent=item.name;row.querySelector("p").textContent=item.text;commentsList.append(row)}comments.hidden=false}
function like(button){const state=button.getAttribute("aria-pressed")==="true",base=Number(button.dataset.likeCount),next=!state,count=base+(next?1:0);button.setAttribute("aria-pressed",String(next));button.firstChild.textContent=next?"♥ ":"♡ ";button.querySelector("span").textContent=String(count);const all=read(LIKE_KEY,{});all[button.closest(".sns-card").dataset.postId]={liked:next,likeCount:count};write(LIKE_KEY,all)}
function relative(t){const d=Math.max(0,Date.now()-Number(t)),m=60000,h=3600000,day=86400000;if(d<m)return"방금 전";if(d<h)return`${Math.floor(d/m)}분 전`;if(d<day)return`${Math.floor(d/h)}시간 전`;if(d<day*7)return`${Math.floor(d/day)}일 전`;return new Date(t).toLocaleDateString("ko-KR")}
function buildPlayerPost(r){const a=document.createElement("article");a.className="card sns-card";a.dataset.postId=r.id;a.dataset.playerPost="true";a.innerHTML='<div class="profile-row"><div class="avatar player">나</div><div><strong>사용자</strong><span class="post-time"></span></div></div><p class="post-text"></p><div class="reaction-row"><button class="like-button" data-like-count="0" aria-pressed="false">♡ <span>0</span></button><button class="comment-button">댓글 <span class="comment-count">0</span></button></div>';a.querySelector(".post-text").textContent=r.text;a.querySelector(".post-time").textContent=relative(r.createdAt);a.querySelector(".like-button").onclick=e=>like(e.currentTarget);a.querySelector(".comment-button").onclick=()=>openComments(r.id);postList.prepend(a)}
function restorePosts(){const list=read(POST_KEY,[]);if(Array.isArray(list))list.forEach(buildPlayerPost);showPost(0)}
function createPost(text){const list=read(POST_KEY,[]),r={id:`player-${Date.now()}`,text,createdAt:Date.now()};list.push(r);write(POST_KEY,list);buildPlayerPost(r);showPost(0)}
function renderMessage(r){const row=document.createElement("div");row.className=`chat-row${r.role==="player"?" player-message":r.role==="system"?" system-message":""}`;const av=document.createElement("div"),content=document.createElement("div"),name=document.createElement("strong"),message=document.createElement("p");av.className=`avatar ${r.role==="player"?"player":r.className||""}`;av.textContent=r.role==="player"?"나":r.avatar||"";content.className="content";name.textContent=r.role==="player"?"사용자":r.name||"";message.textContent=r.text;content.append(name,message);row.append(av,content);chat.append(row);scrollLatest()}
function readChat(){const value=read(CHAT_KEY,[]);return Array.isArray(value)?value:[]}
function appendSaved(r){const list=readChat();list.push(r);write(CHAT_KEY,list);renderMessage(r)}
function appendTransient(text){renderMessage({role:"system",text})}
function restoreChat(){BASE_CHAT.forEach(renderMessage);const list=readChat();list.forEach(renderMessage);replySequence=list.filter(x=>x.role==="character").length;renderStatuses();scrollLatest()}
function availableCandidates(excluded=null){return activeCharacters().filter(c=>c.id!==excluded&&statusInfo(c).canReply)}
function chooseCharacter(excluded=null,targetId=null,first=false){const target=targetId&&CHARACTER_DB[targetId],targetStatus=target&&statusInfo(target);if(first&&target&&target.id!==excluded&&targetStatus.canReply)return target;const list=availableCandidates(excluded);if(!list.length)return CHARACTER_DB.ion;return list[replySequence%list.length]}
function statusNoticeForTarget(targetId){if(!targetId)return null;const c=CHARACTER_DB[targetId],s=statusInfo(c);return s.canReply?null:`${c.name}는 ${s.label}이라 지금 답하지 못하고 있습니다.`}
function makeReply(intent,excluded=null,targetId=null,first=false){const c=chooseCharacter(excluded,targetId,first),text=buildReply(intent,c),status=statusInfo(c);replySequence++;return{message:{role:"character",character:c.id,name:c.name,avatar:c.avatar,className:c.className,text,intent,createdAt:Date.now()},delay:status.delay}}
async function schedule(token,intent,targetId){const unavailable=statusNoticeForTarget(targetId);if(unavailable){await wait(450);if(token!==replyToken)return;appendTransient(unavailable)}const first=makeReply(intent,null,targetId,true);await wait(800+first.delay);if(token!==replyToken)return;appendSaved(first.message);const second=makeReply(intent,first.message.character,targetId,false);await wait(900+second.delay);if(token!==replyToken)return;appendSaved(second.message)}
function addPlayer(text){replyToken++;const token=replyToken,{intent,targetId}=analyze(text),r={role:"player",text,intent,targetId,createdAt:Date.now()};appendSaved(r);schedule(token,intent,targetId)}
stack.addEventListener("pointerdown",e=>{if(!comments.hidden||!postForm.hidden||e.target.closest("button,input,textarea"))return;gesture={on:true,id:e.pointerId,x:e.clientX,y:e.clientY,lastY:e.clientY,axis:null};stack.setPointerCapture(e.pointerId)},true);stack.addEventListener("pointermove",e=>{if(!gesture.on||gesture.id!==e.pointerId)return;const dx=e.clientX-gesture.x,dy=e.clientY-gesture.y;if(!gesture.axis&&Math.max(Math.abs(dx),Math.abs(dy))>12)gesture.axis=Math.abs(dx)>Math.abs(dy)?"h":"v";if(screen==="groupChat"&&gesture.axis==="v")chat.scrollTop-=e.clientY-gesture.lastY;gesture.lastY=e.clientY},true);stack.addEventListener("pointerup",e=>{if(!gesture.on||gesture.id!==e.pointerId)return;const dx=e.clientX-gesture.x,dy=e.clientY-gesture.y;if(gesture.axis==="h"&&Math.abs(dx)>55)showScreen(screen==="sns"?"groupChat":"sns");else if(gesture.axis==="v"&&screen==="sns"&&Math.abs(dy)>55)showPost(post+(dy<0?1:-1));gesture.on=false},true);
document.querySelectorAll("[data-screen]").forEach(b=>b.onclick=()=>showScreen(b.dataset.screen));document.querySelectorAll(".like-button").forEach(b=>b.onclick=()=>like(b));document.querySelectorAll(".comment-button").forEach(b=>b.onclick=()=>openComments(b.closest(".sns-card").dataset.postId));$("close-comments").onclick=()=>comments.hidden=true;comments.onclick=e=>{if(e.target===comments)comments.hidden=true};$("open-post-form").onclick=()=>{postForm.hidden=false;postText.focus()};function closePost(){postForm.hidden=true;postText.value="";formStatus.textContent="0 / 200";submitPost.disabled=true}$("close-post-form").onclick=closePost;$("cancel-post").onclick=closePost;postForm.onclick=e=>{if(e.target===postForm)closePost()};postText.oninput=()=>{formStatus.textContent=`${postText.value.length} / 200`;submitPost.disabled=!postText.value.trim()};postForm.querySelector("form").onsubmit=e=>{e.preventDefault();const t=postText.value.trim();if(t){createPost(t);closePost()}};chatInput.oninput=()=>sendButton.disabled=!chatInput.value.trim();chatForm.onsubmit=e=>{e.preventDefault();const t=chatInput.value.trim();if(!t)return;addPlayer(t);chatInput.value="";sendButton.disabled=true;chatInput.focus()};
renderComments();restorePosts();restoreChat();const likeStates=read(LIKE_KEY,{});refreshCards();cards.forEach(c=>{const s=likeStates[c.dataset.postId];if(!s)return;const b=c.querySelector(".like-button");b.dataset.likeCount=String(Math.max(0,Number(s.likeCount)-(s.liked?1:0)));b.setAttribute("aria-pressed",String(!!s.liked));b.firstChild.textContent=s.liked?"♥ ":"♡ ";b.querySelector("span").textContent=String(s.likeCount)});scrollLatest();
</script></body></html>
