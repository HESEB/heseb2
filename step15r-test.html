<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HESEB STEP 15-R</title><style>*{box-sizing:border-box}body{margin:0;background:#eef3f6;font-family:system-ui,sans-serif;color:#392e2a}.app{width:min(100%,430px);height:100dvh;margin:auto;display:flex;flex-direction:column;background:#f8fbfc}.head{padding:18px;color:#fff;text-align:center;font-weight:800;background:linear-gradient(90deg,#f185ae,#f8b871,#a573ed,#6bb2ff)}.info{padding:12px 16px;font-size:.86rem;color:#765f57}.chat{flex:1;overflow:auto;padding:16px;background:#edf5f8}.row{display:flex;gap:10px;margin:12px 0;align-items:flex-start}.row.me{flex-direction:row-reverse}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;background:#ff806f}.bubble{max-width:78%;padding:11px 13px;border-radius:16px;background:#fff}.me .bubble{background:#f26758;color:#fff}.name{font-weight:800;margin-bottom:4px}.form{display:flex;gap:8px;padding:12px;background:#fff}.form input{flex:1;border:1px solid #ddd;border-radius:14px;padding:12px;font:inherit}.form button{border:0;border-radius:14px;padding:0 16px;background:#f26758;color:#fff;font-weight:800}.reset{border:0;background:transparent;text-decoration:underline;color:#765f57}.buddy{background:#ff806f}.hash{background:#64aef4}.ena{background:#f5b45f}.sady{background:#9a62eb}.ion{background:#8d7167}</style></head><body><main class="app"><div class="head">HESEB STEP 15-R 반복 방지 테스트</div><div class="info">같은 문장을 여러 번 보내 답변이 연속 반복되는지 확인하세요. <button id="reset" class="reset">반복 기록 초기화</button></div><section id="chat" class="chat"></section><form id="form" class="form"><input id="input" autocomplete="off" placeholder="예: 안녕"><button>전송</button></form></main><script>"use strict";const KEY="HESEB_STEP15R_REPEAT_TEST";const chars=[{id:"buddy",name:"버디",a:"B",c:"buddy"},{id:"hash",name:"해시",a:"H",c:"hash"},{id:"ena",name:"에나",a:"E",c:"ena"},{id:"sady",name:"새디",a:"S",c:"sady"},{id:"ion",name:"이온",a:"I",c:"ion"}];const pools={greeting:["안녕! 반가워.","오늘도 왔구나.","왔네, 잘 지냈어?","어서 와!","오, 안녕."],thanks:["천만에.","도움이 됐다면 나도 좋아.","괜찮아, 같이 있잖아.","그 말은 내가 더 고맙지."],daily:["응, 듣고 있어.","그 이야기 더 해봐.","그랬구나.","계속 말해도 돼.","오늘은 그런 일이 있었구나."]};let seq=0;const chat=document.getElementById("chat"),input=document.getElementById("input");function read(){try{return JSON.parse(localStorage.getItem(KEY)||"{}")||{}}catch{return{}}}function save(v){try{localStorage.setItem(KEY,JSON.stringify(v))}catch{}}function intent(t){if(/안녕|하이|반가/.test(t))return"greeting";if(/고마|감사/.test(t))return"thanks";return"daily"}function filter(text,c){if(c.id==="hash")return text.replace(/해봐/g,"말씀해보십쇼").replace(/있어/g,"있슴다").replace(/와/g,"오십쇼");if(c.id==="ena")return text.replace(/[.]$/,"용!").replace(/해봐/g,"해봐용").replace(/있어/g,"있어용");if(c.id==="sady")return text.replace(/해봐/g,"말씀해 주세요").replace(/있어/g,"있습니다");if(c.id==="ion")return "응답 후보 중 최근 중복을 제외해 선택했습니다.";return text}function choose(c,type){const h=read(),used=Array.isArray(h[c.id])?h[c.id]:[],pool=pools[type]||pools.daily,available=pool.filter(x=>!used.includes(x)),base=(available.length?available:pool)[seq%(available.length||pool.length)],final=filter(base,c);h[c.id]=[base,...used.filter(x=>x!==base)].slice(0,Math.max(1,pool.length-1));save(h);return final}function add(role,name,text,c=""){const r=document.createElement("div");r.className="row"+(role==="me"?" me":"");r.innerHTML=role==="me"?'<div class="avatar">나</div><div class="bubble"><div class="name">사용자</div></div>':`<div class="avatar ${c}">${chars.find(x=>x.name===name)?.a||"?"}</div><div class="bubble"><div class="name">${name}</div></div>`;r.querySelector(".bubble").append(document.createTextNode(text));chat.append(r);chat.scrollTop=chat.scrollHeight}document.getElementById("form").onsubmit=e=>{e.preventDefault();const t=input.value.trim();if(!t)return;add("me","",t);input.value="";const type=intent(t),first=chars[seq%chars.length],second=chars[(seq+1)%chars.length];setTimeout(()=>add("bot",first.name,choose(first,type),first.c),350);setTimeout(()=>add("bot",second.name,choose(second,type),second.c),750);seq+=2};document.getElementById("reset").onclick=()=>{localStorage.removeItem(KEY);add("bot","이온","반복 기록을 초기화했습니다.","ion")};add("bot","이온","STEP 15-R 테스트 준비가 완료되었습니다.","ion");</script></body></html>
